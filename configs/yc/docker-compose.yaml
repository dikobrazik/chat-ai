version: '3.7'

services:
    nginx:
        image: ghcr.io/dikobrazik/chat-ai-nginx-front:latest
        container_name: modseccrs
        environment:
            MODSEC_AUDIT_LOG: /var/log/modsec/audit.log
            MODSEC_DEBUG_LOG: /var/log/modsec/debug.log
            SSL_CERT: /etc/letsencrypt/live/jonu.ru/fullchain.pem
            SSL_CERT_KEY: /etc/letsencrypt/live/jonu.ru/privkey.pem
            MANUAL_MODE: 1
        ports:
            - '80:8080'
            - '443:8443'
        volumes:
            - /etc/letsencrypt:/etc/letsencrypt
            - shared-volume:/var/tmp/shared-docker
            - ~/log/nginx:/var/log/nginx
            - ~/log/modsec:/var/log/modsec
        restart: always
        depends_on:
            - frontend

    frontend:
        image: ghcr.io/dikobrazik/chat-ai-front:latest
        container_name: frontend
        volumes:
            - /tmp/.next/cache:/usr/app/.next/cache
        restart: always

    backend:
        image: ghcr.io/dikobrazik/chat-ai-api:latest
        container_name: backend
        volumes:
            - shared-volume:/var/tmp/shared-docker
        env_file:
            - ./backend.env
        restart: always

    uptime-kuma:
        image: louislam/uptime-kuma:2
        container_name: uptime
        restart: unless-stopped
        volumes:
            - ./data:/var/tmp/uptime
        # ports:
        # - "3001:3001"

volumes:
    shared-volume:
    next-images:
